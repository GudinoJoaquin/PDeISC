<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <section class="flex flex-col items-center mt-8">
      <h1 class="font-bold text-3xl">Copiar numeros</h1>
      <div
        id="numeros"
        class="mt-2 flex gap-2 bg-teal-100 px-4 py-1 rounded-sm border-2 border-teal-500"
      ></div>
      <button
        id="copiarNumerosBtn"
        class="mt-2 bg-teal-600 px-6 rounded-sm border-2 border-teal-600 font-semibold text-white hover:scale-110 transition duration-300 focus:bg-teal-200 focus:text-teal-600"
      >
        Copiar
      </button>
      <div
        id="nuevosNumeros"
        class="flex gap-2 bg-teal-100 px-4 py-1 mt-2 rounded-sm border-2 border-teal-500"
      ></div>
    </section>

    <section class="flex flex-col items-center mt-8">
      <h1 class="font-bold text-3xl">Copiar peliculas</h1>
      <div
        id="peliculas"
        class="flex gap-2 mt-2 bg-teal-100 px-4 py-1 rounded-sm border-2 border-teal-500"
      ></div>
      <button
        id="copiarPeliculasBtn"
        class="mt-2 bg-teal-600 px-6 rounded-sm border-2 border-teal-600 font-semibold text-white hover:scale-110 transition duration-300 focus:bg-teal-200 focus:text-teal-600"
      >
        Copiar
      </button>
      <div
        id="nuevasPeliculas"
        class="flex gap-2 mt-2 bg-teal-100 px-4 py-1 mt-2 rounded-sm border-2 border-teal-500"
      ></div>
    </section>

    <section class="flex flex-col items-center mt-8">
      <h1 class="font-bold text-3xl">Copiar elemntos</h1>
      <div
        id="elementos"
        class="flex gap-2 mt-2 bg-teal-100 px-4 py-1 rounded-sm border-2 border-teal-500"
      ></div>
      <button
        id="copiarElementosBtn"
        class="mt-2 bg-teal-600 px-6 rounded-sm border-2 border-teal-600 font-semibold text-white hover:scale-110 transition duration-300 focus:bg-teal-200 focus:text-teal-600"
      >
        Copiar
      </button>
      <div
        id="nuevasElementos"
        class="flex gap-2 mt-2 bg-teal-100 px-4 py-1 mt-2 rounded-sm border-2 border-teal-500"
      ></div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="script.js"></script>
  </body>
</html>
