<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>

    <section class="flex flex-col items-center mt-8">
      <h1 class="font-bold text-3xl">Reverse</h1>

      <div
        id="letras"
        class="mt-2 flex flex-wrap justify-center mx-10 gap-2 bg-teal-100 px-4 py-1 rounded-sm border-2 border-teal-500"
      ></div>
      <button id="btn-reverse-letras" class="mt-4 px-4 py-2 bg-teal-500 text-white rounded">Invertir Letras</button>

      <div
        id="numeros-reverse"
        class="mt-4 flex flex-wrap justify-center mx-10 gap-2 bg-teal-100 px-4 py-1 rounded-sm border-2 border-teal-500"
      ></div>
      <button id="btn-reverse-numeros" class="mt-4 px-4 py-2 bg-teal-500 text-white rounded">Invertir Números</button>

      <div
        id="string-reverse"
        class="mt-4 flex flex-wrap justify-center mx-10 gap-2 bg-teal-100 px-4 py-1 rounded-sm border-2 border-teal-500"
      ></div>
      <button id="btn-reverse-string" class="mt-4 px-4 py-2 bg-teal-500 text-white rounded">Invertir String</button>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="script.js"></script>
  </body>
</html>
