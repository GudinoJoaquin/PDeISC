<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <section class="flex flex-col items-center mt-8">
      <h1 class="font-bold text-3xl">Buscar un animal</h1>
      <input
        type="text"
        class="bg-teal-100 pl-2 pr-4 py-1 placeholder:italic placeholder:text-teal-600 border-2 border-teal-500 rounded-sm focus:outline-2 focus:outline-offset-2 focus:outline-teal-500"
        id="animal"
        required
        placeholder="Animal"
      />
      <div
        id="animales"
        class="mt-2 flex flex-wrap justify-center mx-10 gap-2 bg-teal-100 px-4 py-1 rounded-sm border-2 border-teal-500"
      ></div>
    </section>

    <section class="flex flex-col items-center mt-8">
      <h1 class="font-bold text-3xl">Buscar un numero</h1>
      <input
        type="number"
        class="bg-teal-100 pl-2 pr-4 py-1 placeholder:italic placeholder:text-teal-600 border-2 border-teal-500 rounded-sm focus:outline-2 focus:outline-offset-2 focus:outline-teal-500"
        id="numero"
        required
        placeholder="Numero"
      />
      <button
        id="enviarNumeroBtn"
        class="mt-2 bg-teal-600 px-6 rounded-sm border-2 border-teal-600 font-semibold text-white hover:scale-110 transition duration-300 focus:bg-teal-200 focus:text-teal-600"
      >
        Buscar
      </button>
      <div
        id="numeros"
        class="mt-2 flex flex-wrap justify-center mx-10 gap-2 bg-teal-100 px-4 py-1 rounded-sm border-2 border-teal-500"
      ></div>
    </section>

    <section class="flex flex-col items-center mt-8">
      <h1 class="font-bold text-3xl">Buscar a madrid</h1>
      <button
        id="buscarCiudadBtn"
        class="mt-2 bg-teal-600 px-6 rounded-sm border-2 border-teal-600 font-semibold text-white hover:scale-110 transition duration-300 focus:bg-teal-200 focus:text-teal-600"
      >
        Buscar Madrid
      </button>
      <div
        id="ciudades"
        class="mt-2 flex flex-wrap justify-center mx-10 gap-2 bg-teal-100 px-4 py-1 rounded-sm border-2 border-teal-500"
      ></div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="script.js"></script>
  </body>
</html>
