<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div
      id="alerta"
      class="fixed top-0 left-4 translate-y-[-50px] transition duration-300 border-2 px-24 py-2 rounded-sm"
    >
      <p id="mensaje" class="font-semibold"></p>
    </div>
    <section class="flex flex-col items-center mt-8">
      <h1 class="font-bold text-3xl">Buscar una palabra</h1>
      <input
        type="text"
        class="bg-teal-100 pl-2 pr-4 py-1 placeholder:italic placeholder:text-teal-600 border-2 border-teal-500 rounded-sm focus:outline-2 focus:outline-offset-2 focus:outline-teal-500"
        id="palabra"
        required
        placeholder="Palabra"
      />
      <div
        id="palabras"
        class="mt-2 flex flex-wrap justify-center mx-10 gap-2 bg-teal-100 px-4 py-1 rounded-sm border-2 border-teal-500"
      ></div>
    </section>

    <section class="flex flex-col items-center mt-8">
      <h1 class="font-bold text-3xl">Buscar un color</h1>
      <input
        type="text"
        class="bg-teal-100 pl-2 pr-4 py-1 placeholder:italic placeholder:text-teal-600 border-2 border-teal-500 rounded-sm focus:outline-2 focus:outline-offset-2 focus:outline-teal-500"
        id="color"
        required
        placeholder="Color"
      />
      <div
        id="colores"
        class="mt-2 flex flex-wrap justify-center mx-10 gap-2 bg-teal-100 px-4 py-1 rounded-sm border-2 border-teal-500"
      ></div>
    </section>

    <section class="flex flex-col items-center mt-8">
      <h1 class="font-bold text-3xl">Agregar numeros</h1>
      <input
        type="text"
        class="bg-teal-100 pl-2 pr-4 mt-2 py-1 placeholder:italic placeholder:text-teal-600 border-2 border-teal-500 rounded-sm focus:outline-2 focus:outline-offset-2 focus:outline-teal-500"
        id="numero"
        required
        placeholder="Numero"
      />
      <button
        id="agregarNumerosBtn"
        class="mt-2 bg-teal-600 px-6 rounded-sm border-2 border-teal-600 font-semibold text-white hover:scale-110 transition duration-300 focus:bg-teal-200 focus:text-teal-600"
      >
        Agregar
      </button>
      <div
        id="numeros"
        class="mt-2 flex flex-wrap justify-center mx-10 gap-2 bg-teal-100 px-4 py-1 rounded-sm border-2 border-teal-500"
      ></div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="script.js"></script>
  </body>
</html>
